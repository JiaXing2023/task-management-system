{% extends "admin/index.html" %}

{% block content %}
{{ block.super }}

<!-- 数据统计模块（适配Django Admin原生样式，更美观） -->
<div class="dashboard-stats" style="margin: 20px 0; padding: 15px; background: #f5f5f5; border: 1px solid #e1e1e1; border-radius: 4px;">
    <h2 style="margin-top: 0; font-size: 18px; color: #333; border-bottom: 1px solid #e1e1e1; padding-bottom: 10px;">业务数据统计</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 15px;">
        <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #e1e1e1;">
            <p style="margin: 0; font-size: 12px; color: #666;">总用户数</p>
            <p style="margin: 4px 0 0; font-size: 20px; font-weight: bold; color: #417690;">{{ total_users }}</p>
        </div>
        <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #e1e1e1;">
            <p style="margin: 0; font-size: 12px; color: #666;">今日新增用户</p>
            <p style="margin: 4px 0 0; font-size: 20px; font-weight: bold; color: #718c00;">{{ today_new_users }}</p>
        </div>
        <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #e1e1e1;">
            <p style="margin: 0; font-size: 12px; color: #666;">总任务数</p>
            <p style="margin: 4px 0 0; font-size: 20px; font-weight: bold; color: #5b80b2;">{{ total_tasks }}</p>
        </div>
        <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #e1e1e1;">
            <p style="margin: 0; font-size: 12px; color: #666;">待办任务数</p>
            <p style="margin: 4px 0 0; font-size: 20px; font-weight: bold; color: #b45f06;">{{ pending_tasks }}</p>
        </div>
        <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #e1e1e1;">
            <p style="margin: 0; font-size: 12px; color: #666;">已完成任务数</p>
            <p style="margin: 4px 0 0; font-size: 20px; font-weight: bold; color: #4572a7;">{{ completed_tasks }}</p>
        </div>
    </div>
</div>
{% endblock %}
